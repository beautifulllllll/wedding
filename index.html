<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️정진호 김혜인 결혼합니다❤️</title>
  <style>
    /* [기본 스타일] - 모바일(화면이 작을 때) 기준 */
    body {
      background-color: #fff7fb;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      box-sizing: border-box;
      padding-bottom: 50px;
    }

    h1 {
      color: #d63384;
      font-size: 22px;
      line-height: 1.5;
      padding: 0 20px;
      word-break: keep-all;
    }

    h2 {
      color: #fff;
      font-size: 18px;
      margin-bottom: 15px;
    }

    p {
      font-size: 15px;
      color: #ddd;
      margin: 8px 0;
    }

    /* 첫 번째 영상 영역 (상단 풀화면 비디오) */
    .hero {
      position: relative;
      width: 100%;
      background-color: #000;
    }

    .main-video {
      width: 100%;
      height: 60vh;
      object-fit: cover;
      display: block;
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      word-break: keep-all;
    }

    /* 두 번째 영상 */
    .wedding-video {
      width: 100%;
      max-width: 900px; /* 좀 더 시원하게 확장 */
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* 💡 사진 가로 비율을 더 넉넉하게 채우는 상자 */
    .img-group {
      display: flex;            
      justify-content: center;  
      gap: 8px;                /* 사진 간격을 아주 조금 줄여서 사진 크기를 더 확보 */
      max-width: 1200px;       /* PC에서 가로로 훨씬 더 넓게 퍼지도록 확장 */
      margin: 40px auto;        
      padding: 0 8px;          /* 모바일 좌우 여백을 줄여 가로 비율을 최대로 활용 */
      box-sizing: border-box;
      width: 100%;
    }

    /* 💡 가로로 꽉 차고 시원하게 보이도록 비율 조정 */
    .wedding-img {
      width: 32.5%;            /* 마진과 여백을 뺀 남은 공간을 거의 꽉 채우도록 수정 */
      height: auto;             
      object-fit: cover;        
      border-radius: 6px;       
    }

    /* ------------------------------------------- */
    /* 💻 윈도우(PC) 화면 조건 설정 (가로 768px 이상) */
    /* ------------------------------------------- */
    @media (min-width: 768px) {
      .main-video {
        height: 100vh;
      }

      h1 {
        font-size: 36px;
        margin: 40px 0;
      }

      h2 {
        font-size: 28px;
      }

      p {
        font-size: 20px;
      }
      
      .img-group {
        gap: 15px;             /* PC에서는 화면이 넓으므로 간격도 넉넉하게 조정 */
        padding: 0 30px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- 첫 번째 영상 영역 -->
    <div class="hero">
      <video class="main-video" autoplay muted loop playsinline>
        <source src="demarry.mp4" type="video/mp4">
      </video>

      <div class="hero-text">
        <h2>행복의 시작을 축하 해주시고, 함께해 주시면 감사하겠습니다</h2>
        <p>날짜: 2026년 10월 11일</p>
        <p>장소: 광주 드메르 웨딩홀</p>
        <p>계좌번호: 330-9101-7320 (하나은행_예금주: 정진호)</p>
      </div>
    </div>

    <!-- 두 번째 영상 영역 -->
    <div style="margin: 50px 0; padding: 20px 0;">
      <video class="wedding-video" autoplay loop muted playsinline>
        <source src="wedding.mp4" type="video/mp4">
      </video>
    </div>

    <!-- 인사말 영역 -->
    <div style="margin: 60px 0;">
      <h1>천상에서 이어준 인연에 서로의 몸과 마음을 맡겨</h1>
      <h1>한 마음 한 뜻으로 살아가보려 합니다</h1>
    </div>
    
    <!-- 이미지 영역 -->
    <div class="img-group">
      <img src="cople.jpg" class="wedding-img">
      <img src="family.jpg" class="wedding-img">
      <img src="band.jpg" class="wedding-img">
    </div>

  </div> 

</body>
</html>
